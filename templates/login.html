<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if node_type == 'admin' %}Admin Login{% else %}Member Login{% endif %} — Hospital IoT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --card: #0d1117;
            --border: #1e2d3d;
            --accent: {% if node_type == 'admin' %}#ff6b35{% else %}#00e5ff{% endif %};
            --text: #cdd9e5;
            --muted: #546e7a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 16px;
            padding: 2.5rem;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }
        .node-badge {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .login-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            margin-bottom: 2rem;
        }
        .form-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
        }
        .form-control {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            background: rgba(0,0,0,0.5);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
            color: var(--text);
            outline: none;
        }
        .btn-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            color: {% if node_type == 'admin' %}#fff{% else %}#000{% endif %};
            border: none;
            border-radius: 8px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }
        .alert-error {
            background: rgba(239,71,111,0.1);
            border: 1px solid rgba(239,71,111,0.3);
            color: #ef476f;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            font-family: 'Share Tech Mono', monospace;
        }
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
            font-family: 'Share Tech Mono', monospace;
        }
        .register-link a { color: var(--accent); text-decoration: none; }
        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to nodes
        </a>

        <div class="node-badge">
            {% if node_type == 'admin' %}// NODE-00 — ADMIN ACCESS{% else %}// MEMBER NODE ACCESS{% endif %}
        </div>
        <div class="login-title">
            {% if node_type == 'admin' %}
                <i class="fas fa-shield-halved me-2" style="color:var(--accent);font-size:1.5rem;"></i>Admin Login
            {% else %}
                <i class="fas fa-user-circle me-2" style="color:var(--accent);font-size:1.5rem;"></i>Member Login
            {% endif %}
        </div>

        {% if error %}
        <div class="alert-error"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="register-link">
            No account? <a href="/register">Register here</a>
        </div>
    </div>
</div>
</body>
</html>
