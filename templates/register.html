<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register — Hospital IoT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10; --card: #0d1117; --border: #1e2d3d;
            --accent: #00e5ff; --text: #cdd9e5; --muted: #546e7a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Rajdhani', sans-serif; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        body::before {
            content: ''; position: fixed; top:0;left:0;right:0;bottom:0;
            background-image: linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none;
        }
        .reg-wrap { position:relative;z-index:1;width:100%;max-width:460px;padding:1rem; }
        .reg-card {
            background: var(--card); border: 1px solid var(--border);
            border-top: 3px solid var(--accent); border-radius:16px; padding:2.5rem;
        }
        .back-link { display:inline-flex;align-items:center;gap:0.5rem;color:var(--muted);
            font-family:'Share Tech Mono',monospace;font-size:0.75rem;letter-spacing:1px;
            text-decoration:none;margin-bottom:2rem;transition:color 0.2s; }
        .back-link:hover { color:var(--accent); }
        .node-badge { font-family:'Share Tech Mono',monospace;font-size:0.65rem;
            color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:0.5rem; }
        .reg-title { font-size:2rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:2rem; }
        .form-label { font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--muted);
            letter-spacing:2px;text-transform:uppercase;margin-bottom:0.4rem; }
        .form-control, .form-select {
            background:rgba(0,0,0,0.4);border:1px solid var(--border);color:var(--text);
            border-radius:8px;padding:0.7rem 1rem;font-family:'Share Tech Mono',monospace;
            font-size:0.9rem;transition:border-color 0.2s;
        }
        .form-control:focus, .form-select:focus {
            background:rgba(0,0,0,0.5);border-color:var(--accent);
            box-shadow:0 0 0 3px rgba(0,229,255,0.08);color:var(--text);outline:none;
        }
        .form-select option { background:#0d1117; color:var(--text); }
        .role-toggle { display:flex;gap:0.5rem;margin-bottom:1.25rem; }
        .role-btn {
            flex:1;padding:0.6rem;background:rgba(0,0,0,0.3);border:1px solid var(--border);
            color:var(--muted);border-radius:8px;font-family:'Share Tech Mono',monospace;
            font-size:0.75rem;letter-spacing:1px;text-align:center;cursor:pointer;transition:all 0.2s;
        }
        .role-btn.active { border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,0.08); }
        .role-btn.active-admin { border-color:#ff6b35;color:#ff6b35;background:rgba(255,107,53,0.08); }
        .btn-register {
            width:100%;padding:0.8rem;background:var(--accent);color:#000;border:none;
            border-radius:8px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;
            letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s,transform 0.1s;margin-top:0.5rem;
        }
        .btn-register:hover { opacity:0.9;transform:translateY(-1px); }
        .alert-error { background:rgba(239,71,111,0.1);border:1px solid rgba(239,71,111,0.3);
            color:#ef476f;padding:0.7rem 1rem;border-radius:8px;margin-bottom:1.25rem;
            font-size:0.85rem;font-family:'Share Tech Mono',monospace; }
        .alert-success { background:rgba(6,214,160,0.1);border:1px solid rgba(6,214,160,0.3);
            color:#06d6a0;padding:0.7rem 1rem;border-radius:8px;margin-bottom:1.25rem;
            font-size:0.85rem;font-family:'Share Tech Mono',monospace; }
        .login-link { text-align:center;margin-top:1.5rem;font-size:0.85rem;
            color:var(--muted);font-family:'Share Tech Mono',monospace; }
        .login-link a { color:var(--accent);text-decoration:none; }
        #sensor-group { display:block; }
    </style>
</head>
<body>
<div class="reg-wrap">
    <div class="reg-card">
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to nodes</a>
        <div class="node-badge">// CREATE ACCOUNT</div>
        <div class="reg-title"><i class="fas fa-user-plus me-2" style="color:var(--accent);font-size:1.5rem;"></i>Register</div>

        {% if error %}<div class="alert-error"><i class="fas fa-exclamation-circle me-2"></i>{{ error }}</div>{% endif %}
        {% if success %}<div class="alert-success"><i class="fas fa-check-circle me-2"></i>{{ success }} <a href="/" style="color:inherit;text-decoration:underline;">Go to nodes</a></div>{% endif %}

        <form method="POST" id="regForm">
            <div class="mb-3">
                <label class="form-label">Account Type</label>
                <div class="role-toggle">
                    <div class="role-btn active" id="btn-member" onclick="setRole('member')">
                        <i class="fas fa-user me-1"></i> Member
                    </div>
                    <div class="role-btn" id="btn-admin" onclick="setRole('admin')">
                        <i class="fas fa-shield-halved me-1"></i> Admin
                    </div>
                </div>
                <input type="hidden" name="role" id="roleInput" value="member">
            </div>
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Choose a password" required>
            </div>
            <div class="mb-3" id="sensor-group">
                <label class="form-label">Assigned Sensor</label>
                <select name="sensor" class="form-select" id="sensorSelect" required>
                    <option value="dht22">🌡️ DHT22 — Temperature & Humidity</option>
                    <option value="ldr">💡 LDR — Light Sensor</option>
                    <option value="pir">🏃 PIR — Motion Sensor</option>
                    <option value="bodytemp">🩺 Body Temp — DS18B20</option>
                    <option value="camera">📷 Camera — ESP32-CAM</option>
                </select>
            </div>
            <button type="submit" class="btn-register"><i class="fas fa-user-plus me-2"></i>Create Account</button>
        </form>

        <div class="login-link">Already have an account? <a href="/">Login here</a></div>
    </div>
</div>

<script>
function setRole(role) {
    document.getElementById('roleInput').value = role;
    const btnMember = document.getElementById('btn-member');
    const btnAdmin = document.getElementById('btn-admin');
    const sensorGroup = document.getElementById('sensor-group');
    const sensorSelect = document.getElementById('sensorSelect');

    if (role === 'admin') {
        btnMember.className = 'role-btn';
        btnAdmin.className = 'role-btn active-admin';
        sensorGroup.style.display = 'none';
        sensorSelect.removeAttribute('required');
    } else {
        btnMember.className = 'role-btn active';
        btnAdmin.className = 'role-btn';
        sensorGroup.style.display = 'block';
        sensorSelect.setAttribute('required', '');
    }
}
</script>
</body>
</html>
